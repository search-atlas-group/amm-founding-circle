<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Report Title</title>
  <style>
    :root {
      --bg: #f7f8fb;
      --card: #ffffff;
      --ink: #17202a;
      --muted: #5d6b7a;
      --line: #d9e0e8;
      --accent: #2563eb;
      --good: #0f766e;
      --warn: #b45309;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font: 15px/1.55 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 40px 20px 64px;
    }
    header, section {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 18px;
    }
    h1, h2, h3 { line-height: 1.2; margin: 0 0 12px; }
    h1 { font-size: 34px; }
    h2 { font-size: 22px; }
    p { margin: 0 0 12px; }
    .lede { color: var(--muted); font-size: 18px; }
    .callout {
      border-left: 4px solid var(--accent);
      background: #eef4ff;
      padding: 14px 16px;
      border-radius: 6px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      background: var(--card);
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px;
      text-align: left;
      vertical-align: top;
    }
    th { color: var(--muted); font-weight: 700; }
    @media (max-width: 640px) {
      main { padding: 20px 12px 40px; }
      header, section { padding: 18px; }
      h1 { font-size: 28px; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Report Title</h1>
      <p class="lede">One-sentence takeaway goes here.</p>
    </header>
    <section>
      <h2>TL;DR</h2>
      <div class="callout">Recommendation and why.</div>
    </section>
    <section>
      <h2>Findings</h2>
      <table>
        <thead><tr><th>Finding</th><th>Evidence</th><th>Implication</th></tr></thead>
        <tbody><tr><td>Example</td><td>Example</td><td>Example</td></tr></tbody>
      </table>
    </section>
  </main>
</body>
</html>
